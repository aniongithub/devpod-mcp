name: Release

on:
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: devcontainer-mcp-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: devcontainer-mcp-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: devcontainer-mcp-darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: devcontainer-mcp-darwin-arm64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation deps
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p devcontainer-mcp

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/devcontainer-mcp ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
